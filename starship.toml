"$schema" = 'https://starship.rs/config-schema.json'

format = """
$directory\
$git_branch\
$git_status\
$fill\
$lua\
$terraform\
$nodejs\
$rust\
$golang\
\n$character"""

[directory]
style = "fg:#e3e5e5"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "ΎΑΒ "
"Pictures" = "ΎΑ╛ "

[git_branch]
style = "bg:#394260"
symbol = "ΎΡα"
format = '[[ $symbol $branch ](fg:#7aa2f7)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#f7768e)]($style)'

[lua]
symbol = "ΏθΝΧ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#ff899d)]($style)'

[terraform]
symbol = "≤▒Βλ "
style = "bg:#212736"
format = '[[ $symbol$workspace ($version) ](fg:#ff899d)]($style)'
detect_extensions = ["tf", "tfvars", "hcl"]
detect_files = [".terraform-version"]
detect_folders = [".terraform"]

[nodejs]
symbol = "Όεα"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#ff899d)]($style)'

[rust]
symbol = "Όηρ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#ff899d)]($style)'

[golang]
symbol = "Όαπ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#ff899d)]($style)'

