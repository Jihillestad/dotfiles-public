import = ["~/.config/alacritty/themes/themes/tokyo-night.toml"]
# import = [ "~/.config/alacritty/themes/themes/tokyonight_day.toml" ]

[env]
TERM = "xterm-256color"

[cursor]
style = "Block"
unfocused_hollow = true

[font]
size = 19.0

[font.bold]
family = "MesloLGS Nerd Font"
style = "Bold"

[font.bold_italic]
family = "MesloLGS Nerd Font"
style = "Bold Italic"

[font.glyph_offset]
x = 0
y = 0

[font.italic]
family = "MesloLGS Nerd Font"
style = "Italic"

[font.normal]
family = "MesloLGS Nerd Font"
style = "Regular"

[font.offset]
x = 0
y = 0

[scrolling]
history = 10000
multiplier = 3

[window]
decorations = "None"
opacity = 0.90
blur = true

[window.dimensions]
columns = 140
lines = 38

[window.padding]
x = 10
y = 10
